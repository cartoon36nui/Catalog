<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOMATSU Forklift Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c0f;--bg2:#111418;--bg3:#181c22;--border:#252a32;--border2:#3a424f;--acc:#f5a623;--text:#e8ecf2;--dim:#8a95a3;--faint:#4a5360;--gas:#4ade80;--diesel:#60a5fa;--elec:#a78bfa;--red:#f87171;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;}
/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(10,12,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:16px;height:56px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--acc);}
.logo span{color:var(--dim);font-size:13px;font-family:'Sarabun',sans-serif;letter-spacing:1px;}
#cmp-badge{display:none;background:var(--acc);color:#000;font-weight:700;font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer;border:none;font-family:'Sarabun',sans-serif;align-items:center;gap:6px;white-space:nowrap;margin-left:auto;}
#cmp-badge.on{display:inline-flex;}
/* FILTER */
.fbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;}
.sw{position:relative;flex:1;min-width:200px;max-width:340px;}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none;}
#search{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:14px;padding:8px 12px 8px 36px;outline:none;transition:border-color .2s;}
#search:focus{border-color:var(--acc);}
#search::placeholder{color:var(--faint);}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--dim);font-family:'Sarabun',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.chip:hover{border-color:var(--acc);color:var(--acc);}
.chip.on{background:var(--acc);border-color:var(--acc);color:#000;font-weight:600;}
.chip.gas.on{background:var(--gas);border-color:var(--gas);color:#000;}
.chip.diesel.on{background:var(--diesel);border-color:var(--diesel);color:#000;}
.chip.elec.on{background:var(--elec);border-color:var(--elec);color:#000;}
.cnt{color:var(--faint);font-size:12px;margin-left:auto;white-space:nowrap;}
/* GRID */
.gw{padding:20px;}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px;}
/* CARD */
.card{background:#1a1f28;border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:0;transition:opacity .2s;}
.card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4);}
.card:hover::before,.card.sel::before{opacity:1;}
.card.sel{border-color:var(--acc);}
.ch{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.mn{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;}
.eb{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;letter-spacing:.5px;flex-shrink:0;}
.eb.gas{background:rgba(74,222,128,.15);color:var(--gas);border:1px solid rgba(74,222,128,.3);}
.eb.diesel{background:rgba(96,165,250,.15);color:var(--diesel);border:1px solid rgba(96,165,250,.3);}
.eb.elec{background:rgba(167,139,250,.15);color:var(--elec);border:1px solid rgba(167,139,250,.3);}
.cs{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.sr{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.sl{color:var(--faint);font-size:11px;flex-shrink:0;}
.sv{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);text-align:right;}
.sv.hl{color:var(--acc);font-weight:500;}
.cf{display:flex;align-items:center;justify-content:space-between;}
.btn-d{font-family:'Sarabun',sans-serif;font-size:12px;color:var(--dim);background:transparent;border:1px solid var(--border2);border-radius:6px;padding:5px 12px;cursor:pointer;transition:all .15s;}
.btn-d:hover{border-color:var(--acc);color:var(--acc);}
.btn-c{font-family:'Sarabun',sans-serif;font-size:11px;color:var(--faint);background:transparent;border:none;cursor:pointer;padding:4px 6px;border-radius:4px;transition:color .15s;}
.btn-c:hover,.btn-c.on{color:var(--acc);}
/* MODAL */
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.ov.open{opacity:1;pointer-events:all;}
.mdl{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:780px;max-height:90vh;overflow-y:auto;padding:28px;position:relative;transform:translateY(20px);transition:transform .2s;}
.ov.open .mdl{transform:translateY(0);}
.mt{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:500;color:var(--acc);margin-bottom:4px;}
.ms{color:var(--faint);font-size:13px;margin-bottom:20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.mc{position:absolute;top:18px;right:18px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--dim);cursor:pointer;padding:5px 10px;font-size:18px;line-height:1;transition:all .15s;}
.mc:hover{border-color:var(--red);color:var(--red);}
.sec{margin-bottom:20px;}
.st{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--faint);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:10px;}
.sg{display:flex;flex-direction:column;}
.si{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:8px 10px;border-radius:6px;transition:background .1s;}
.si:nth-child(odd){background:rgba(255,255,255,.025);}
.si:hover{background:rgba(245,166,35,.06);}
.sil{color:var(--dim);font-size:13px;flex:1;}
.siv{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);text-align:right;flex-shrink:0;max-width:55%;}
.siv.hl{color:var(--acc);font-weight:500;}
/* COMPARE */
#cp{position:fixed;inset:0;z-index:300;background:var(--bg);overflow-y:auto;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
#cp.open{transform:none;}
.cph{position:sticky;top:0;z-index:10;background:rgba(10,12,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;}
.cpt{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--acc);}
.cpc{margin-left:auto;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--dim);cursor:pointer;padding:6px 14px;font-family:'Sarabun',sans-serif;font-size:13px;transition:all .15s;}
.cpc:hover{border-color:var(--red);color:var(--red);}
.cpb{padding:24px;overflow-x:auto;}
table{border-collapse:collapse;width:100%;min-width:500px;}
th{background:var(--bg3);padding:10px 14px;text-align:left;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--acc);border:1px solid var(--border);white-space:nowrap;position:sticky;top:0;}
th:first-child{color:var(--faint);font-size:11px;font-family:'Sarabun',sans-serif;min-width:210px;}
td{padding:7px 14px;border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);}
tr:hover td{background:rgba(255,255,255,.02);}
td:first-child{font-family:'Sarabun',sans-serif;color:var(--dim);font-size:12px;}
td.best{color:var(--gas);font-weight:600;}
.empty{text-align:center;padding:80px 20px;color:var(--faint);grid-column:1/-1;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

</style>
</head>
<body>
<header>
  <div class="logo">KOMATSU <span>FORKLIFT CATALOG</span></div>
  <button id="cmp-badge" onclick="openCp()">⚖ <span id="cc">0</span> รุ่น — เปรียบเทียบ</button>
</header>
<div class="fbar">
  <div class="sw">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="ค้นหารุ่น เช่น FD25, FB15…" oninput="doF()">
  </div>
  <div class="chips">

    <button class="chip diesel" onclick="setE('ดีเซล',this)">🛢️ ดีเซล</button>
    <button class="chip elec"   onclick="setE('ไฟฟ้า',this)">⚡ ไฟฟ้า</button>
  </div>
  <span class="cnt" id="cnt">—</span>
</div>
<div class="gw"><div id="grid"></div></div>
<div class="ov" id="ov" onclick="if(event.target===this)closeMdl()">

</div>
<div id="cp">

  <div class="cpb"><div id="cpb"></div></div>

function ec(e){return e==='เบนซิน'?'gas':e==='ดีเซล'?'diesel':'elec';}
function el(e){return e==='เบนซิน'?'เบนซิน':e==='ดีเซล'?'ดีเซล':'ไฟฟ้า';}
function fv(v){if(v==null||v==='-'||v==='')return'—';return v;}
function fn(v){const n=parseFloat(String(v).replace(/,/g,''));return isNaN(n)?null:n;}

let curE='all',curQ='',cmpSet=new Set();

function setE(v,el_){curE=v;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el_.classList.add('on');render();}
function doF(){curQ=document.getElementById('search').value.toLowerCase();render();}

function getF(){return MS.filter(m=>(curE==='all'||m.energy===curE)&&(!curQ||m.name.toLowerCase().includes(curQ)));}

const CARD_KEYS=['น้ำหนักของสัมภาระที่ยกได้สูงสุด(Q)กก.','น้ำหนักตัวรถ กก.','วงเลี้ยว (Wa) มม.','ความสามารถในการขึ้นทางลาดชัน มีสัมภาระ %'];
const CARD_LBL=['น้ำหนักยก','น้ำหนักรถ','วงเลี้ยว','ทางลาด'];

function render(){
  const list=getF();
  document.getElementById('cnt').textContent=list.length+' รุ่น';
  const g=document.getElementById('grid');
  if(!list.length){g.innerHTML='<div class="empty"><div style="font-size:48px;margin-bottom:12px">🔍</div><p>ไม่พบรุ่นที่ค้นหา</p></div>';return;}
  g.innerHTML=list.map(m=>{
    const e=ec(m.energy),sel=cmpSet.has(m.name);
    const rows=CARD_KEYS.map((k,i)=>{
      const v=m.spec[k]; const n=fn(v);
      const disp=n!=null?n.toLocaleString()+(k.includes('กก')?'':k.includes('มม')||k.includes('Wa')?' มม.':k.includes('%')?' %':''):fv(v);
      return `<div class="sr"><span class="sl">${CARD_LBL[i]}</span><span class="sv${i===0?' hl':''}">${disp}</span></div>`;
    }).join('');
    return `<div class="card${sel?' sel':''}" id="c-${m.name.replace(/[^a-zA-Z0-9]/g,'_')}" onclick="openMdl('${m.name}')">
      <div class="ch"><div class="mn">${m.name}</div><span class="eb ${e}">${el(m.energy)}</span></div>
      <div class="cs">${rows}</div>
      <div class="cf">
        <button class="btn-d" onclick="event.stopPropagation();openMdl('${m.name}')">ดูสเปคเต็ม</button>
        <button class="btn-c${sel?' on':''}" onclick="event.stopPropagation();togCmp('${m.name}')">${sel?'✓ เลือก':'+ เปรียบเทียบ'}</button>
      </div>
    </div>`;
  }).join('');
}

function openMdl(name){
  const m=MS.find(x=>x.name===name);if(!m)return;
  const e=ec(m.energy);
  let html=`<div class="mt">${m.name}</div>
    <div class="ms"><span class="eb ${e}">${el(m.energy)}</span><span>${m.spec['ประเภทของรถยก']||''}</span><span>${m.spec['ประเภทยาง']||''}</span></div>`;
  SECS.forEach(s=>{
    const rows=s.k.map(k=>{
      const v=m.spec[k];
      if(!v||v==='-'||v==='')return'';
      const n=fn(v); const isN=n!=null&&typeof v!=='string';
      return `<div class="si"><span class="sil">${k}</span><span class="siv${isN?' hl':''}">${isN?n.toLocaleString():v}</span></div>`;
    }).filter(Boolean).join('');
    if(!rows)return;
    html+=`<div class="sec"><div class="st">${s.t}</div><div class="sg">${rows}</div></div>`;
  });
  document.getElementById('mb').innerHTML=html;
  document.getElementById('ov').classList.add('open');
}
function closeMdl(){document.getElementById('ov').classList.remove('open');}

function togCmp(name){
  if(cmpSet.has(name)){cmpSet.delete(name);}
  else{if(cmpSet.size>=4){alert('เปรียบเทียบได้สูงสุด 4 รุ่น');return;}cmpSet.add(name);}
  document.getElementById('cc').textContent=cmpSet.size;
  document.getElementById('cmp-badge').classList.toggle('on',cmpSet.size>1);
  render();
}

function openCp(){
  const sel=[...cmpSet].map(n=>MS.find(m=>m.name===n)).filter(Boolean);
  if(sel.length<2)return;
  const allKeys=Object.keys(SPECS).filter(k=>k!=='ประเภทพลังงาน'&&k!=='ประเภทของรถยก');
  const hdrs=sel.map(m=>`<th>${m.name}<br><small style="font-weight:400;color:var(--dim);font-family:Sarabun">${el(m.energy)}</small></th>`).join('');
  const rows=allKeys.map(k=>{
    const vals=sel.map(m=>m.spec[k]??'—');
    const nums=vals.map(v=>fn(v));
    const allNum=nums.every(n=>n!=null);
    const maxN=allNum&&nums.length>1?Math.max(...nums):null;
    const cells=vals.map((v,i)=>{
      const best=maxN!=null&&nums[i]===maxN;
      return `<td class="${best?'best':''}">${fv(v)}</td>`;
    }).join('');
    return `<tr><td>${k}</td>${cells}</tr>`;
  }).join('');
  document.getElementById('cpb').innerHTML=`<table><thead><tr><th>สเปค / รุ่น</th>${hdrs}</tr></thead><tbody>${rows}</tbody></table><p style="margin-top:12px;color:var(--faint);font-size:11px"><span style="color:var(--gas)">■</span> ค่าสูงสุดในกลุ่มที่เปรียบเทียบ</p>`;
  document.getElementById('cp').classList.add('open');
}
function closeCp(){document.getElementById('cp').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeMdl();closeCp();}});
render();
</script>
</body>
</html>
